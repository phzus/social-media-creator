# Marketing Squad Extremo — Configuração Central
# v3.1.0

project:
  name: "Marketing Squad Extremo"
  version: "3.2.0"
  description: "Sistema de orquestração de agentes de IA para marketing digital de alta conversão. 17 agentes em 6 tiers, 20 tipos de funil, 11 quality gates bloqueantes. Versão v3.2 atualizada em 2026-04-10."
  author: "Anthony Nichols"
  type: specialist
  independence: true
  independence_details: |
    Squad 100% independente, sem dependências externas obrigatórias.
    Opera com YAML + Markdown + Claude Code.
    Ferramentas externas (n8n, ManyChat, Meta Ads) são consumidas pelos agentes, não requeridas pelo sistema.
    Design Squad e Content Distillery absorvidos como DNA nos agentes v3.0.

# Entry point
entry_agent: theboss

# Tier Architecture
tier_system:
  tier_0_command:
    name: "Comando & Estratégia"
    description: "Diagnóstico, roteamento e orquestração de todas as operações"
    agents:
      - theboss       # Estrategista-Chefe & Orquestrador Master
  tier_1_intelligence:
    name: "Inteligência & Pesquisa"
    description: "Pesquisa de mercado, análise competitiva, métricas, produto"
    agents:
      - analyzer       # Pesquisa de Mercado & Inteligência Competitiva
      - metrics        # Analytics, Dashboards & KPIs
      - luluzinha      # Product Experience Manager (NEW v3.0)
  tier_2_creation:
    name: "Criação & Produção"
    description: "Copy, criativos, páginas, motion, social media, código"
    agents:
      - claudinho      # Copywriter Senior de Alta Conversão
      - picasso        # Diretor Criativo Master, Brand Strategy & Design (UPGRADED v3.0 — Design Squad DNA)
      - pixel          # Web Designer & LOVABLE Specialist
      - nerd           # Desenvolvedor Full-Stack & Integrador Técnico (UPGRADED v3.0 — AIOX + ClaudeKit)
      - milagroso      # Video Editor, Motion Designer & Visual Producer (UPGRADED v3.0 — Design Squad DNA)
      - laurinha       # Social Media Strategist & Content Producer (NEW v3.0)
  tier_3_growth:
    name: "Crescimento & Distribuição"
    description: "Tráfego pago, automações, escala"
    agents:
      - cadu           # Gestor de Tráfego Pago Senior
      - salazar        # Automações & I.A
  tier_4_revenue:
    name: "Receita & Retenção"
    description: "Vendas, qualificação, customer success, pitch ao vivo"
    agents:
      - andreza        # Closer de Vendas
      - danilo         # SDR & Qualificação
      - carla          # Customer Success & Pós-Venda
      - pitchinho      # Pitch de Vendas & Script de Evento (NEW v3.2)
  tier_5_operations:
    name: "Operações & Gestão"
    description: "Cronogramas, SOPs, logística"
    agents:
      - rafa           # Gestora de Projetos

# Agent Registry
agents:
  total: 17
  master: theboss
  squads:
    comando: [theboss]
    inteligencia: [analyzer, metrics, luluzinha]
    criacao: [claudinho, picasso, pixel, nerd, milagroso, laurinha]
    growth: [cadu, salazar]
    receita: [andreza, danilo, carla, pitchinho]
    operacoes: [rafa]

# Handoff Protocol
handoff:
  enabled: true
  max_artifact_tokens: 500
  max_retained_summaries: 3
  storage: ".mse/handoffs/"
  compaction_on_switch: true

# Triage System
triage:
  philosophy: "Diagnosticar antes de agir, rotear antes de criar"
  max_diagnostic_questions: 3
  entry_point: theboss
  routing_triggers:
    copy: claudinho
    criativo: picasso
    pagina: pixel
    trafego: cadu
    automacao: salazar
    pesquisa: analyzer
    metricas: metrics
    venda: andreza
    qualificacao: danilo
    posvenda: carla
    cronograma: rafa
    codigo: nerd
    video: milagroso
    social: laurinha
    conteudo: laurinha
    produto: luluzinha
    curso: luluzinha
    pitch: pitchinho
    evento: pitchinho
    imersao: pitchinho
    seeding: pitchinho

