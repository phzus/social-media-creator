# Fases do Funil
phases:
  - id: captacao
    code: CAP
    name: "Captação"
  - id: antecipacao
    code: ANT
    name: "Antecipação"
  - id: evento
    code: EVT
    name: "Evento"
  - id: vendas
    code: VND
    name: "Vendas"
  - id: upsell
    code: UPS
    name: "Upsell"
  - id: downsell
    code: DWS
    name: "Downsell"
  - id: pos-venda
    code: PVD
    name: "Pós-venda"
  - id: qualificacao
    code: QUA
    name: "Qualificação"
  - id: pre-evento
    code: PRE
    name: "Pré-evento"
  - id: perpetuo
    code: PRP
    name: "Perpétuo"

# Quality System
quality:
  max_review_cycles: 3
  briefing_required: true
  theboss_review: true
  gate_severity_levels:
    BLOCK: "Impede avanço. Sem exceção."
    WARN: "Permite avanço com registro de risco. Anthony informado."
    INFO: "Registra observação. Não bloqueia."
  gates:
    - id: QG-001
      name: "Briefing Completo"
      severity: BLOCK
      before: produção
      checker: theboss
    - id: QG-002
      name: "Estratégia Aprovada"
      severity: BLOCK
      before: montagem
      checker: anthony
    - id: QG-003
      name: "Squad Montado"
      severity: BLOCK
      before: produção
      checker: theboss
    - id: QG-004
      name: "Copy Revisada"
      severity: BLOCK
      before: publicação
      checker: theboss
    - id: QG-005
      name: "Pré-Lançamento"
      severity: BLOCK
      before: go-live
      checker: theboss + rafa
    - id: QG-006
      name: "Aprovação Final"
      severity: BLOCK
      before: go-live
      checker: anthony

# Decision Heuristics
decision_heuristics:
  - id: DH-001
    name: "Existing Project Check"
    rule: "SEMPRE verificar projects/ antes de criar projeto novo"
  - id: DH-002
    name: "Workflow Match"
    rule: "Rotear para o workflow de funil mais adequado ao cenário"
  - id: DH-003
    name: "Squad Availability"
    rule: "Se agente sobrecarregado, renegociar timeline com @rafa"
  - id: DH-004
    name: "Micro vs Campaign"
    rule: "Peça avulsa = task direto. Campanha completa = workflow completo"
  - id: DH-005
    name: "Data Before Execution"
    rule: "Pesquisa do @analyzer ANTES de qualquer estratégia"

# Paths
paths:
  agents: "core/agents"
  tasks: "core/tasks"
  workflows: "core/workflows"
  templates: "core/templates"
  checklists: "core/checklists"
  frameworks: "core/frameworks"
  data: "core/data"
  protocols: "core/protocols"
  scripts: "scripts"
  projects: "projects"

# State Management
state:
  enabled: true
  file: ".mse/state.json"
  track:
    - active_project
    - active_agent
    - current_phase
    - pending_gates
    - handoff_stack
