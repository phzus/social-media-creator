# Workflow: Campanha Rapida — Fast Track (1-3 dias)
# Timeline: 1-3 dias
# Ticket: R$200-2K
# Referencia: Campanha express com squad reduzido

name: campanha-rapida
description: "Campanha Rapida — Fast Track em 1-3 dias"
type: launch
framework: custom
estimated_duration: "1-3 dias"
ticket_range: "R$200-2K"
conversion_target: "Variavel"

# Ideal para:
# - Flash sale
# - Oferta relampago
# - Teste de oferta
# - Liquidacao de estoque
# - Black Friday / datas comemorativas
# - Reativacao de base fria

squad:
  core:
    - theboss    # Estrategia rapida
    - claudinho    # Copy (ads, email, pagina)
    - picasso      # Criativos express
    - cadu         # Trafego imediato
  support:
    - metrics      # Metricas rapidas

phases:

  - id: dia1
    name: "Dia 1 — Setup"
    duration: "1 dia"
    tasks:
      - task: structure-offer
        agent: theboss
        description: "Definir oferta relampago (simples e direta)"
      - task: write-copy
        agent: claudinho
        scope: [captacao, vendas]
        description: "Copy do email, ads e pagina de vendas — TUDO em 1 dia"
      - task: create-creatives
        agent: picasso
        scope: captacao
        description: "2-3 criativos express"
        parallel: true
      - task: plan-traffic
        agent: cadu
        description: "Setup de campanha rapida"
        parallel: true
    deliverables:
      - "{PROJ}_CAP_ADS-META_FLASH-SALE_V1.md"
      - "{PROJ}_VND_EML_OFERTA-RELAMPAGO_V1.md"
      - "{PROJ}_VND_PGN_PAGINA-FLASH_V1.md"

  - id: dia2
    name: "Dia 2 — Execucao"
    duration: "1 dia"
    tasks:
      - task: write-copy
        agent: claudinho
        scope: vendas
        description: "Email de urgencia + mensagens WhatsApp"
      - task: analyze-metrics
        agent: metrics
        description: "Monitorar resultados em tempo real"
    deliverables:
      - "{PROJ}_VND_EML_URGENCIA-FLASH_V1.md"
      - "{PROJ}_VND_MSG-API_URGENCIA_V1.md"

  - id: dia3
    name: "Dia 3 — Fechamento"
    duration: "1 dia"
    tasks:
      - task: write-copy
        agent: claudinho
        scope: vendas
        description: "Email ultima chance + encerramento"
      - task: campaign-report
        agent: metrics
        description: "Relatorio rapido de resultados"
    deliverables:
      - "{PROJ}_VND_EML_ULTIMA-CHANCE-FLASH_V1.md"

gates:
  - name: "Oferta definida"
    before: dia1
    check: "Oferta clara, preco, condicoes, deadline"

success_metrics:
  velocidade: "Campanha no ar em < 24h"
  vendas: "meta definida"
  roas: "> 2x"
