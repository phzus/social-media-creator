# Workflow: Sala Secreta — Evento VIP / Grupo Exclusivo
# Timeline: 1-2 semanas
# Ticket: R$1K-10K
# Referencia: Evento exclusivo para grupo seleto

name: sala-secreta
description: "Sala Secreta — Evento VIP exclusivo para grupo seleto"
type: launch
framework: custom
estimated_duration: "1-2 semanas"
ticket_range: "R$1K-10K"
conversion_target: "10-30% do grupo"

# Ideal para:
# - Oferta VIP para base quente
# - Upgrade de compradores existentes
# - Lancamento de mastermind/mentoria
# - Convite exclusivo (FOMO real)

squad:
  core:
    - theboss    # Estrategia
    - claudinho    # Copy (convites, conteudo, pitch)
    - salazar      # Automacao do grupo
    - andreza      # Fechamento (call ou no grupo)
  support:
    - metrics      # Metricas

phases:

  - id: preparacao
    name: "Preparacao"
    duration: "2-3 dias"
    tasks:
      - task: structure-offer
        agent: theboss
        description: "Oferta VIP exclusiva"

  - id: captacao
    name: "Convite Exclusivo"
    duration: "2-3 dias"
    description: "Convite pessoal e exclusivo — sensacao de selecao"
    tasks:
      - task: write-copy
        agent: claudinho
        scope: captacao
        description: "Mensagens de convite pessoal (WhatsApp/email)"
      - task: setup-automations
        agent: salazar
        scope: captacao
        description: "Criar grupo fechado + automacao de entrada"
    deliverables:
      - "{PROJ}_CAP_MSG-API_CONVITE-VIP_V1.md"
      - "{PROJ}_CAP_EML_CONVITE-SALA-SECRETA_V1.md"

  - id: antecipacao
    name: "Aquecimento no Grupo"
    duration: "1-3 dias"
    tasks:
      - task: write-copy
        agent: claudinho
        scope: antecipacao
        description: "Conteudo exclusivo + antecipacao da oferta"
    deliverables:
      - "{PROJ}_ANT_MSG-GRP_CONTEUDO-VIP_V1.md"

  - id: evento
    name: "Evento da Sala Secreta"
    duration: "1-2 dias"
    description: "Conteudo premium + revelacao da oferta VIP"
    tasks:
      - task: write-copy
        agent: claudinho
        scope: evento
        description: "Script do evento + conteudo premium"
    deliverables:
      - "{PROJ}_EVT_SCR_SALA-SECRETA_V1.md"

  - id: vendas
    name: "Vendas"
    duration: "2-3 dias"
    tasks:
      - task: write-copy
        agent: claudinho
        scope: vendas
        description: "Mensagens de oferta + follow-up"
      - task: close-sales
        agent: andreza
        description: "Fechamento no grupo ou via call"
    deliverables:
      - "{PROJ}_VND_MSG-GRP_OFERTA-VIP_V1.md"
      - "{PROJ}_VND_SCV_SCRIPT-CALL-VIP_V1.md"

  - id: pos-venda
    name: "Pos-Venda"
    duration: "Continuo"
    tasks:
      - task: onboard-client
        agent: carla

gates:
  - name: "Grupo com minimo"
    before: evento
    check: "Pelo menos 20 pessoas no grupo VIP"

success_metrics:
  grupo: ">= 20 membros"
  conversion: "10-30%"
  ticket_medio: "> R$ definido"
